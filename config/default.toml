# deep-think-mcp packaged defaults.
#
# This file is the base layer of the config stack:
#   packaged defaults (this file) < user config (<root>/config.toml) < per-session overrides
#
# Values here are copied verbatim to <root>/config.toml by config.bootstrap()
# the first time a data root is initialized. Editing that copy customizes a
# given install; this file only changes the shipped defaults.

[store]
# Data root. Overridden by the DEEP_THINK_HOME environment variable, which
# always wins regardless of what's configured here. See config.resolve_root().
root = "~/deep-think-mcp"
# Reserved -- not yet honored (v1 always uses sessions/ and index.json). When
# implemented, both will be resolved relative to [store].root.
sessions_dir = "sessions"
index_path = "index.json"

[modes]
# Server always asks the user to pick a mode via start_session's
# mode-required payload, even when a default is configured here.
default_prompt_user = true

[serial]
max_rounds = 3
score_threshold = 0.05
# Normalized edit distance (0.0 = identical, 1.0 = totally different) below
# which a refinement is treated as a fixed point: the critique produced no
# meaningful change, so the serial loop converges and commits. Default 0.05
# is [derived] per docs/execution-plan.md Task 7 ("< epsilon (default 0.05,
# configurable)"). Computed with stdlib difflib.SequenceMatcher (no new deps).
edit_distance_epsilon = 0.05
fast_mode = false
# Full critique lens library (see src/deep_think_mcp/lenses/, added in a
# later task); serial mode rotates through these per round.
default_lenses = [
    "overconfidence",
    "weak_evidence",
    "missing_perspective",
    "unstated_assumption",
    "scope_creep",
    "alternative_framing",
    "steel_man",
    "first_principles",
]

[subagent]
max_rounds = 2
# equilibrium_threshold is OUR commit-gate criterion, NOT the vendored Nash
# matrix-diff convergence epsilon (those are different quantities -- see
# necort_adapter.py's docstring and subagent_engine.py). It is the minimum
# Nash peer-rating (the populated-dim value, 0..1) the winning candidate must
# reach for the engine to report the equilibrium as strong enough to commit.
# It is deliberately compared against the winner's *populated* dim (which
# carries the real Nash signal), never the 7-dim overall mean -- that mean
# structurally cannot exceed (3*1.0 + 4*0.5)/7 = 0.714 because 4 of 7 dims are
# unpopulatable neutral sentinels, so a 0.75 gate on the mean could never pass.
equilibrium_threshold = 0.75
# The specialist roster (subagent mode). Each name gets a default framing from
# prompts.SPECIALIST_FRAMINGS; stages.agent_weight_for_stage() weights a
# specialist higher in its home stage (Analysis in Analysis, Creativity in
# Synthesis). num_agents passed to the Nash core = len(this list).
agents = ["Analysis", "Creativity", "Skeptic"]
sequential_fallback = true
# Engine for subagent mode: "necort" drives the vendored Nash core against the
# endpoint(s) below; "manual" (T13) is the endpoint-free path where the calling
# model plays each specialist itself. When no endpoint is configured, subagent
# mode directs the caller to the manual path rather than failing opaquely.
engine = "necort"
# OpenAI-compatible endpoint(s) for the Nash core. Provide EITHER a single base
# URL as `endpoint`, OR several as `endpoints = [...]` to fan competing Nash
# negotiations out concurrently (endpoints wins if both are set). Empty (the
# default) = NO endpoint configured -> the manual-path directive. The server
# never contacts these unless a subagent tool is actually invoked.
endpoint = ""
endpoints = []
# Model name and optional bearer token sent to the endpoint above.
model = "qwen2.5:14b"
api_key = ""
# Per-request HTTP timeout (seconds) for the endpoint call.
timeout = 120.0

[stages]
default = [
    "Problem Definition",
    "Research",
    "Analysis",
    "Synthesis",
    "Conclusion",
]

[autopilot]
enabled = false
endpoint = "http://localhost:11434/v1"
model = "qwen2.5:14b"
# No explicit default given in docs/build-plan.md; 0.7 is a reasonable
# general-purpose default, off by default since autopilot.enabled = false.
temperature = 0.7
